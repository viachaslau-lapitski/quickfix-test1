tps=400
prod=1
len=17000
store=file
log=none
# spread=true sends one message every (1/tps) seconds instead of bursting all tps
# messages at once. Required for SSL with len > 16383 (one TLS record limit) to
# prevent SSLException: Tag mismatch! (race in MINA 2.2.4 SSLHandlerG1.forward_writes).
spread=true# inflight: max messages concurrently in MINA's write pipeline.
# BackpressureFilter acquires before sendToTarget(), releases in messageSent().
# Lower = safer ordering (1 = fully sequential). Raise if throughput drops.
inflight=4
