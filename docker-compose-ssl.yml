# FIX benchmark — Docker Compose (mTLS / SSL mode)
#
# Quickstart:
#   docker compose -f docker-compose-ssl.yml up --build
#
# Or via the helper script:
#   ./run/run-docker.sh --ssl
#
# All env-var overrides from docker-compose.yml apply here as well.

name: fixbench-ssl

networks:
  fix-net:
    driver: bridge

services:

  fix-server:
    build:
      context: .
      dockerfile: quickfix-server/Dockerfile
    container_name: fix-server-ssl
    hostname: fix-server
    networks:
      - fix-net
    ports:
      - "9876:9876"
      - "9877:9877"
    cap_add:
      - NET_ADMIN          # required for tc netem
    volumes:
      - ./docker/server-ssl.cfg:/app/server.cfg:ro
      - ./run/certs:/app/certs:ro
    environment:
      LAT_MS:        ${LAT_MS:-0}
      LAT_JITTER_MS: ${LAT_JITTER_MS:-0}
      PLR:           ${PLR:-0}
      BW_MBIT:       ${BW_MBIT:-0}
      JVM_OPTS:      ${JVM_OPTS:--Xms256m -Xmx512m}
    deploy:
      resources:
        limits:
          cpus:   "${SERVER_CPUS:-1.0}"
          memory: "${SERVER_MEM:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z -w1 localhost 9876"]
      interval: 3s
      timeout:  2s
      retries:  15
      start_period: 5s

  fix-client:
    build:
      context: .
      dockerfile: quickfix-client/Dockerfile
    container_name: fix-client-ssl
    hostname: fix-client
    networks:
      - fix-net
    cap_add:
      - NET_ADMIN          # required for tc netem
    depends_on:
      fix-server:
        condition: service_healthy
    volumes:
      - ./docker/client-ssl.cfg:/app/client.cfg:ro
      - ./docker/app.properties:/app/app.properties:ro
      - ./run/certs:/app/certs:ro
    environment:
      LAT_MS:        ${LAT_MS:-0}
      LAT_JITTER_MS: ${LAT_JITTER_MS:-0}
      PLR:           ${PLR:-0}
      BW_MBIT:       ${BW_MBIT:-0}
      JVM_OPTS:      ${JVM_OPTS:--Xms128m -Xmx256m}
    deploy:
      resources:
        limits:
          cpus:   "${CLIENT_CPUS:-2.0}"
          memory: "${CLIENT_MEM:-256m}"
